<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0e06" />
  <meta name="mobile-web-app-capable" content="yes">  <title>ملك السحراء</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div id="loading-screen">
    <div class="loading-wheel">
      <div class="wheel-rim"></div>
      <div class="wheel-logo">👑</div>
    </div>
    <h1 class="loading-title">ملك السحراء</h1>
    <p class="loading-sub">King of the Deserts</p>
    <div class="loading-bar-track">
      <div class="loading-bar-fill" id="loading-progress"></div>
    </div>
    <p class="loading-pct" id="loading-pct">0%</p>
  </div>

  <div class="app-shell hidden" id="app-shell">

    <!-- ====== الشريط العلوي ====== -->
    <header id="top-bar">
      <div id="top-multiplier" class="top-chip top-multiplier">
        <span class="multiplier-icon">🚀</span>
        <span class="multiplier-value" id="multiplier-display">x1</span>
        <span class="multiplier-arrow">↑</span>
      </div>
      <div class="top-resources">
        <div class="top-chip top-resource top-cash" id="top-cash">
          <span class="res-icon">💵</span>
          <span class="res-value" id="cash-display">0</span>
        </div>
        <div class="top-chip top-resource top-gold" id="top-gold">
          <span class="res-icon">🪙</span>
          <span class="res-value" id="gold-display">0</span>
        </div>
        <div class="top-chip top-resource top-food" id="top-food">
          <span class="res-icon">🌾</span>
          <span class="res-value" id="food-display">0</span>
        </div>
        <div class="top-chip top-resource top-power" id="top-power">
          <span class="res-icon">👊</span>
          <span class="res-value" id="power-display">0</span>
        </div>
      </div>
      <div class="top-level-wrap">
        <div class="top-level-bar">
          <span class="level-label" id="level-label">LV 1</span>
          <div class="level-track">
            <div class="level-fill" id="level-fill" style="width:0%"></div>
          </div>
        </div>
        <div class="top-avatar" id="top-avatar">🧙</div>
      </div>
    </header>

    <!-- ====== الشريط الثانوي (إنجازات، تصنيع، أحداث، Prestige، يومية) ====== -->
    <nav id="sub-bar" class="sub-bar">
      <button class="sub-btn" type="button" data-screen="daily" data-icon="📅">
        <span class="nav-icon">📅</span>
        <span class="nav-label">يومية</span>
      </button>
      <button class="sub-btn" type="button" data-screen="achievements" data-icon="🏆">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">إنجازات</span>
      </button>
      <button class="sub-btn" type="button" data-screen="inventory" data-icon="📦">
        <span class="nav-icon">📦</span>
        <span class="nav-label">تصنيع</span>
      </button>
      <button class="sub-btn" type="button" data-screen="events_panel" data-icon="🎊">
        <span class="nav-icon">🎊</span>
        <span class="nav-label">أحداث</span>
      </button>
      <button class="sub-btn" type="button" data-screen="prestige_panel" data-icon="🔄">
        <span class="nav-icon">🔄</span>
        <span class="nav-label">Prestige</span>
      </button>
    </nav>

    <!-- ====== المحتوى الرئيسي ====== -->
    <main id="screen-content"></main>

    <!-- ====== Tutorial Overlay ====== -->
    <div id="tutorial-overlay" class="tutorial-overlay" style="display:none">
      <div class="tutorial-box">
        <div class="tutorial-icon">👑</div>
        <p id="tutorial-text" class="tutorial-text">مرحباً بك في ملك الصحراء!</p>
        <div class="tutorial-buttons">
          <button id="tutorial-skip-btn" class="tutorial-btn tutorial-skip">تخطي</button>
          <button id="tutorial-next-btn" class="tutorial-btn tutorial-next">التالي →</button>
        </div>
      </div>
    </div>

    <!-- ====== Chat UI ====== -->
    <div id="chat-panel" class="chat-panel hidden">
      <div class="chat-header">💬 الشات</div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" class="chat-input" placeholder="اكتب رسالة..." maxlength="100" />
        <button id="chat-send-btn" class="chat-send-btn">➤</button>
      </div>
    </div>

    <!-- ====== Canvas للعالم (شاشة الحرب) ====== -->
    <canvas id="gameCanvas" class="hidden"></canvas>
    <div class="world-buttons hidden" id="world-buttons">
      <button id="exit-world-btn" class="world-exit-btn">✕</button>
      <button id="chat-toggle-btn" class="chat-toggle-btn" title="شات">💬</button>
      <button id="recenter-btn" class="recenter-btn">🎯</button>
      <button id="zoom-in-btn" class="zoom-btn" title="تكبير">＋</button>
      <button id="zoom-out-btn" class="zoom-btn" title="تصغير">－</button>
    </div>

    <!-- ====== لوحة اللاعبين المتصلين ====== -->
    <div id="player-panel" class="player-panel hidden">
      <div class="player-panel-header">
        <span>👥 المتصلون</span>
        <span id="player-count" class="player-panel-count">0</span>
      </div>
      <div id="player-list" class="player-list"></div>
    </div>

    <!-- ====== إشعارات ====== -->
    <div id="notification-container" class="notification-container"></div>

    <!-- ====== الشريط السفلي (5 أزرار رئيسية) ====== -->
    <nav id="bottom-bar" class="bottom-bar">
      <button class="nav-btn" type="button" data-screen="ranking" data-icon="🏆">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">المرتبة</span>
      </button>
      <button class="nav-btn active" type="button" data-screen="promotion" data-icon="🐪">
        <span class="nav-icon">🐪</span>
        <span class="nav-label">الترقية</span>
      </button>
      <button class="nav-btn" type="button" data-screen="territories" data-icon="🗺️">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">أراضي</span>
      </button>
      <button class="nav-btn" type="button" data-screen="war" data-icon="⚔️">
        <span class="nav-icon">⚔️</span>
        <span class="nav-label">حرب</span>
      </button>
      <button class="nav-btn" type="button" data-screen="alliance" data-icon="👑">
        <span class="nav-icon">👑</span>
        <span class="nav-label">التحالف</span>
      </button>
    </nav>

  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
