<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 960" width="480" height="960" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- سماء الغروب الملكية: ذهبي → أحمر عميق → بنفسجي ليلي -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1330"/>
      <stop offset="22%" stop-color="#3a1f3d"/>
      <stop offset="45%" stop-color="#7a2b3a"/>
      <stop offset="62%" stop-color="#b8501f"/>
      <stop offset="78%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#8a5a12"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#ffe8a3" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ffb74d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb74d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="duneFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8632a"/>
      <stop offset="100%" stop-color="#6b3a1e"/>
    </linearGradient>
    <linearGradient id="duneMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a3a1e"/>
      <stop offset="100%" stop-color="#4a2312"/>
    </linearGradient>
    <linearGradient id="duneNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d1c10"/>
      <stop offset="100%" stop-color="#1e0e08"/>
    </linearGradient>
    <linearGradient id="palaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a2a15"/>
      <stop offset="100%" stop-color="#241209"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="42%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>

  <!-- السماء -->
  <rect width="480" height="960" fill="url(#sky)"/>

  <!-- نجوم متناثرة في الأعلى -->
  <g fill="#ffffff" opacity="0.75">
    <circle cx="48" cy="70" r="1.4"/>
    <circle cx="120" cy="40" r="1.1"/>
    <circle cx="210" cy="90" r="1.6"/>
    <circle cx="300" cy="55" r="1.2"/>
    <circle cx="360" cy="110" r="1.4"/>
    <circle cx="420" cy="65" r="1.1"/>
    <circle cx="80" cy="150" r="1.2"/>
    <circle cx="270" cy="140" r="1.3"/>
    <circle cx="400" cy="160" r="1.1"/>
    <circle cx="150" cy="120" r="1.5"/>
  </g>

  <!-- توهج الشمس/القمر الذهبي خلف القصر -->
  <ellipse cx="240" cy="560" rx="260" ry="260" fill="url(#sunGlow)"/>
  <circle cx="240" cy="470" r="72" fill="#ffe8a3" opacity="0.9"/>
  <circle cx="240" cy="470" r="72" fill="none" stroke="url(#goldShine)" stroke-width="2" opacity="0.6"/>

  <!-- كثبان بعيدة -->
  <path d="M0,560 Q120,500 240,540 T480,530 L480,620 L0,620 Z" fill="url(#duneFar)" opacity="0.85"/>

  <!-- قصر ملكي صحراوي — قباب ومآذن -->
  <g fill="url(#palaceGrad)">
    <!-- الجسم الرئيسي -->
    <rect x="150" y="470" width="180" height="130" />
    <!-- برج يسار -->
    <rect x="118" y="430" width="34" height="170" />
    <polygon points="118,430 135,395 152,430" />
    <circle cx="135" cy="392" r="6"/>
    <!-- برج يمين -->
    <rect x="328" y="430" width="34" height="170" />
    <polygon points="328,430 345,395 362,430" />
    <circle cx="345" cy="392" r="6"/>
    <!-- القبة المركزية -->
    <path d="M205,470 Q240,405 275,470 Z"/>
    <circle cx="240" cy="402" r="7"/>
    <rect x="237" y="386" width="6" height="18"/>
    <!-- نوافذ مقوسة متوهجة -->
  </g>
  <g fill="#ffd97a" opacity="0.85">
    <path d="M195,520 q10,-16 20,0 v30 h-20 Z"/>
    <path d="M265,520 q10,-16 20,0 v30 h-20 Z"/>
    <path d="M130,480 q8,-13 16,0 v26 h-16 Z"/>
    <path d="M334,480 q8,-13 16,0 v26 h-16 Z"/>
  </g>
  <!-- سور زخرفي أسفل القصر -->
  <g fill="url(#palaceGrad)">
    <rect x="60" y="595" width="360" height="16"/>
    <rect x="70" y="580" width="10" height="16"/>
    <rect x="100" y="580" width="10" height="16"/>
    <rect x="130" y="580" width="10" height="16"/>
    <rect x="340" y="580" width="10" height="16"/>
    <rect x="370" y="580" width="10" height="16"/>
    <rect x="400" y="580" width="10" height="16"/>
  </g>

  <!-- كثبان وسطى -->
  <path d="M0,640 Q100,590 220,625 T480,605 L480,720 L0,720 Z" fill="url(#duneMid)"/>

  <!-- نخيل صحراوي على الكثبان -->
  <g fill="#1e0e08" opacity="0.9">
    <path d="M70,660 q-4,-26 -18,-34 q16,2 20,16 q2,-18 -8,-30 q18,4 14,28 q10,-14 4,-30 q14,10 6,32 l-6,18 Z"/>
    <rect x="66" y="658" width="6" height="34"/>
    <path d="M410,650 q-4,-24 -17,-31 q15,2 18,15 q2,-16 -7,-27 q16,4 13,25 q9,-13 4,-27 q13,9 5,29 l-6,17 Z"/>
    <rect x="406" y="648" width="6" height="32"/>
  </g>

  <!-- كثبان قريبة (مقدمة داكنة) -->
  <path d="M0,760 Q140,700 240,745 T480,720 L480,960 L0,960 Z" fill="url(#duneNear)"/>

  <!-- تعتيم فينييت لضمان وضوح النص فوقها -->
  <rect width="480" height="960" fill="url(#vignette)"/>
</svg>
